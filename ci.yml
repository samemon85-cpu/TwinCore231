name: CI — Test & Build

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/twincore

jobs:
  # ── Node.js API Tests ────────────────────────────────────────────────────────
  test-api:
    name: API Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       twincore_test
          POSTGRES_USER:     twincore
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run linter
        working-directory: api
        run: npm run lint --if-present

      - name: Run unit tests
        working-directory: api
        env:
          NODE_ENV:        test
          JWT_SECRET:      test-secret-minimum-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL:    postgresql://twincore:testpassword@localhost:5432/twincore_test
          REDIS_URL:       redis://localhost:6379
          INFLUXDB_URL:    http://localhost:8086
          INFLUXDB_TOKEN:  test-token
          INFLUXDB_ORG:    twincore
          INFLUXDB_BUCKET: sensors
          MQTT_BROKER_URL: mqtt://localhost:1883
          ML_SERVICE_URL:  http://localhost:8000
        run: npm run test:unit

      - name: Run integration tests
        working-directory: api
        env:
          NODE_ENV:        test
          JWT_SECRET:      test-secret-minimum-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL:    postgresql://twincore:testpassword@localhost:5432/twincore_test
          REDIS_URL:       redis://localhost:6379
          INFLUXDB_URL:    http://localhost:8086
          INFLUXDB_TOKEN:  test-token
          INFLUXDB_ORG:    twincore
          INFLUXDB_BUCKET: sensors
          MQTT_BROKER_URL: mqtt://localhost:1883
          ML_SERVICE_URL:  http://localhost:8000
        run: npm run test:integration

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        if: matrix.node == '20'
        with:
          name: api-coverage
          path: api/coverage/
          retention-days: 7

      - name: Coverage report to PR
        if: github.event_name == 'pull_request' && matrix.node == '20'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: api
          test-script: npm run test:ci

  # ── Python ML Service Tests ───────────────────────────────────────────────────
  test-ml:
    name: ML Service Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        working-directory: ml-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run pytest
        working-directory: ml-service
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload ML coverage
        uses: actions/upload-artifact@v4
        if: matrix.python == '3.12'
        with:
          name: ml-coverage
          path: ml-service/coverage.xml
          retention-days: 7

      - name: Upload to Codecov
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ml-service/coverage.xml
          flags: ml-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Docker build (without push on PR) ────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-ml]
    strategy:
      matrix:
        service:
          - name: api
            context: api
            dockerfile: api/Dockerfile
          - name: ml-service
            context: ml-service
            dockerfile: ml-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }} image
        uses: docker/build-push-action@v5
        with:
          context:     ${{ matrix.service.context }}
          file:        ${{ matrix.service.dockerfile }}
          push:        false
          tags:        ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ github.sha }}
          cache-from:  type=gha,scope=${{ matrix.service.name }}
          cache-to:    type=gha,mode=max,scope=${{ matrix.service.name }}
          target:      production

  # ── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-api, test-ml]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref:  .
          format:    sarif
          output:    trivy-results.sarif
          severity:  CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: NPM audit
        working-directory: api
        run: npm audit --audit-level=high

  # ── Summary gate ────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [test-api, test-ml, build-images, security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test-api.result }}"     != "success" ]] || \
             [[ "${{ needs.test-ml.result }}"      != "success" ]] || \
             [[ "${{ needs.build-images.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All CI checks passed ✓"
