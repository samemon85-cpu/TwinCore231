name: CD — Deploy

on:
  push:
    branches: [main]
    tags:     ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      image_tag:
        description: Docker image tag (defaults to commit SHA)
        required: false

env:
  REGISTRY:     ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/twincore

jobs:
  # ── Build & Push Docker Images ───────────────────────────────────────────────
  publish:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    strategy:
      matrix:
        service:
          - name: api
            context: api
            dockerfile: api/Dockerfile
          - name: ml-service
            context: ml-service
            dockerfile: ml-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context:     ${{ matrix.service.context }}
          file:        ${{ matrix.service.dockerfile }}
          push:        true
          tags:        ${{ steps.meta.outputs.tags }}
          labels:      ${{ steps.meta.outputs.labels }}
          target:      production
          cache-from:  type=gha,scope=${{ matrix.service.name }}
          cache-to:    type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ── Deploy to Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: staging
      url:  https://staging.twincore.io
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.15.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (staging)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade (staging)
        run: |
          helm upgrade --install twincore ./helm/twincore \
            --namespace twincore-staging \
            --create-namespace \
            --set api.image.tag=${{ needs.publish.outputs.image_tag }} \
            --set mlService.image.tag=${{ needs.publish.outputs.image_tag }} \
            --set global.environment=staging \
            --set ingress.host=staging.twincore.io \
            --values helm/twincore/values.staging.yaml \
            --timeout 5m \
            --wait \
            --atomic

      - name: Run smoke tests
        run: |
          sleep 10
          curl -f https://staging.twincore.io/health || exit 1
          curl -f https://staging.twincore.io/ml/health || exit 1
          echo "Smoke tests passed ✓"

      - name: Notify Slack (staging)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Staging deploy *${{ needs.publish.outputs.image_tag }}* — ${{ job.status }}",
              "channel": "#deployments"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Deploy to Production ──────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [publish, deploy-staging]
    environment:
      name: production
      url:  https://app.twincore.io
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.15.0

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade (production) — rolling deploy
        run: |
          helm upgrade --install twincore ./helm/twincore \
            --namespace twincore-prod \
            --create-namespace \
            --set api.image.tag=${{ needs.publish.outputs.image_tag }} \
            --set mlService.image.tag=${{ needs.publish.outputs.image_tag }} \
            --set global.environment=production \
            --set ingress.host=app.twincore.io \
            --set api.replicaCount=3 \
            --set mlService.replicaCount=2 \
            --values helm/twincore/values.production.yaml \
            --timeout 10m \
            --wait \
            --atomic

      - name: Run production smoke tests
        run: |
          sleep 15
          curl -f https://app.twincore.io/health || exit 1
          curl -f https://app.twincore.io/ml/health || exit 1
          echo "Production smoke tests passed ✓"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## TwinCore ${{ github.ref_name }}

            Docker images:
            - `${{ env.IMAGE_PREFIX }}-api:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}-ml-service:${{ github.ref_name }}`

      - name: Notify Slack (production)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🔥' }} Production deploy *${{ github.ref_name }}* — ${{ job.status }}",
              "channel": "#deployments"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
