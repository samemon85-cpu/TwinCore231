version: "3.9"

# ── TWINCORE Digital Twin Platform ─────────────────────────────────────────────
# Full stack: Node.js API · FastAPI ML · PostgreSQL · InfluxDB · Redis · MQTT · Nginx

networks:
  twincore-net:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:

services:

  # ── REVERSE PROXY ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: twincore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - ml-service
    networks: [twincore-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NODE.JS REST/WS API ──────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: twincore-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://twincore:${POSTGRES_PASSWORD}@postgres:5432/twincore
      REDIS_URL: redis://redis:6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: twincore
      INFLUXDB_BUCKET: sensors
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      ML_SERVICE_URL: http://ml-service:8000
      APS_CLIENT_ID: ${APS_CLIENT_ID}
      APS_CLIENT_SECRET: ${APS_CLIENT_SECRET}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks: [twincore-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── FASTAPI ML SERVICE ───────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: twincore-ml
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://twincore:${POSTGRES_PASSWORD}@postgres:5432/twincore
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      MODEL_PATH: /app/models
      LOG_LEVEL: info
    volumes:
      - ./ml-service/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks: [twincore-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── POSTGRESQL (Assets, WOs, Users, Rules) ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: twincore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: twincore
      POSTGRES_USER: twincore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/sql:/docker-entrypoint-initdb.d:ro
    networks: [twincore-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twincore -d twincore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── INFLUXDB (Time-series sensor data) ───────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: twincore-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: twincore
      DOCKER_INFLUXDB_INIT_BUCKET: sensors
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      DOCKER_INFLUXDB_INIT_RETENTION: 90d
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./infra/influxdb/config.yml:/etc/influxdb2/config.yml:ro
    networks: [twincore-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── REDIS (Cache + WebSocket pub/sub + Rate limiting) ─────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: twincore-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [twincore-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MOSQUITTO (MQTT broker for IoT devices) ───────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: twincore-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks: [twincore-net]
    restart: unless-stopped

  # ── MIGRATION RUNNER (runs once then exits) ───────────────────────────────────
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: twincore-migrate
    command: ["node", "src/utils/migrate.js"]
    environment:
      DATABASE_URL: postgresql://twincore:${POSTGRES_PASSWORD}@postgres:5432/twincore
    depends_on:
      postgres:
        condition: service_healthy
    networks: [twincore-net]
    restart: "no"

  # ── SEED DATA (runs once then exits) ─────────────────────────────────────────
  seed:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: twincore-seed
    command: ["node", "src/utils/seed.js"]
    environment:
      DATABASE_URL: postgresql://twincore:${POSTGRES_PASSWORD}@postgres:5432/twincore
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    depends_on:
      migrate:
        condition: service_completed_successfully
      influxdb:
        condition: service_healthy
    networks: [twincore-net]
    restart: "no"
